version: 0.2.0
status: draft_repair_contract
updated_at: '2026-06-22'

defaults:
  source: fixture
  target: all
  dry_run: true
  format: markdown
  fail_on: critical
  fixture_path: tests/fixtures/notion_wiring_fixture.json

notion_wiring_principles:
  primary_workflows:
    - HYBRID
    - FRAMES
    - INGREDIENTS
  manual_snapshot_fields_are_not_authority:
    - AvatarCode
    - PromptV1
    - Compiler Payload / RAW Prompt
    - Output From Compiler
  repair_policy:
    overwrite_manual_fields_before_validation: false
    create_generated_fields_first: true
    compare_manual_to_generated: true
    promote_generated_after_operator_approval: true

