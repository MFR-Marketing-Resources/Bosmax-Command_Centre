validators:
  avatar_ai:
    - id: avatar_code_contains_character_name
      rule: AvatarCode should contain the uppercase CharacterName token.
      severity: high
    - id: prompt_contains_character_name
      rule: PromptV1 should contain the CharacterName token.
      severity: high
    - id: prompt_contains_avatar_code
      rule: PromptV1 should contain AvatarCode.
      severity: high

  compiler_payload:
    - id: payload_matches_engine_duration
      rule: Compiler Payload / RAW Prompt should match selected Engine + Duration authority.
      severity: critical
    - id: payload_matches_product
      rule: Compiler Payload / RAW Prompt should match selected Product authority and product_truth_ref.
      severity: critical
    - id: payload_matches_avatar
      rule: HYBRID payload should match selected Avatar Ai or approved fallback.
      severity: critical
    - id: payload_matches_copy_set
      rule: Compiler Payload / RAW Prompt should match selected BOSMAX or MWTCB copy set.
      severity: critical
    - id: payload_matches_asset_role_map
      rule: INGREDIENTS payload should match selected Asset Role Map and style_scene_source.
      severity: critical
    - id: continuation_fields_included_for_multiblock
      rule: Multi-block durations must include seam state, first 0.5s action, first 1s lipsync, no-VO, and no-cutaway controls.
      severity: critical

recommended_owner_split:
  chatgpt_notion_connector:
    - live_schema_patch
    - sample_row_verification
    - operator_facing_audit
  codex:
    - deterministic_generator_script
    - stale_payload_validator_script
    - bulk_regeneration
    - repository_stored_contract
  notion_ai:
    - not_recommended_for_schema_governance
